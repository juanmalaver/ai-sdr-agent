services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_sdr_agent
      POSTGRES_USER: ai_sdr_agent
      POSTGRES_PASSWORD: ai_sdr_agent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_sdr_agent -d ai_sdr_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
